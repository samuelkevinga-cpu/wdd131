<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
    <meta name="description" content="Explore the temples, their story and their majestic beauty">

    <title>Temples</title>

<body>
    <header>
        <p class="site-title">Temple Album</p>
        <button id="hamburger-btn">☰</button>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Temples</h1>
        <div class="cards-grid">
            <figure class="card">
                <img src="images/temples/abidjan_ivory_coast_temple.jpeg" alt="Abidjan, Ivory Coast">

            </figure>
            <figure class="card">
                <img src="images/temples/arequipa_peru_temple.jpeg" alt="Arequipa, Peru">

            <figure class="card">
                <img src="images/temples/brigham_city_utah_temple.jpeg" alt="Brigham City, Utah">

            <figure class="card">
                <img src="images/temples/casper_wyoming_temple.png" alt="Casper, Wyoming">

            <figure class="card">
                <img src="images/temples/colonia_juarez_chihuahua_mexico_temple.jpeg" alt="Colonia Juarez, Mexico">

                <img src="images/temples/logan_utah_temple.jpeg" alt="Logan, Utah">

            </figure>
            <figure class="card">
                <img src="images/temples/manila_philippines_temple.jpeg" alt="Manila, Philippines">
                <figcaption>Manila, Philippines</figcaption>
            </figure>
            <figure class="card">
                <img src="images/temples/oaxaca_mexico_temple.jpeg" alt="Oaxaca, Mexico">
                <figcaption>Oaxaca, Mexico</figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p>© <span id="currentyear"></span> Kevin Samuel Pacheco García | Oaxaca, México</p>
        <p id="lastModified"></p>
    </footer>
